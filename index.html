<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw Pro — Kinetic Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#030305; --panel:rgba(15,15,25,0.95); --accent:#00f5ff;
  --text:#e0e0ff; --border:rgba(255,255,255,0.1);
  --font-main:'Outfit',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);overflow:hidden;height:100vh;display:flex;}
#canvas-area{flex:1;position:relative;}
canvas{display:block;width:100%;height:100%;}

/* ── Sidebar: fixed height, always scrollable ── */
#sidebar{
  width:260px;background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:0;gap:0;z-index:100;
  overflow-y:auto;overflow-x:hidden;
  box-shadow:-10px 0 30px rgba(0,0,0,0.6);
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:#222244;border-radius:2px;}

.logo-area{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;
  background:var(--panel);z-index:10;
}
.logo-area h1{font-size:18px;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600;}
.status-tag{display:inline-block;font-family:var(--font-mono);font-size:9px;padding:3px 7px;background:rgba(0,245,255,0.1);color:var(--accent);border-radius:4px;margin-top:6px;}

.section{padding:14px 20px;border-bottom:1px solid var(--border);}
.section-label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.3);margin-bottom:10px;}

.control-group{display:flex;flex-direction:column;gap:6px;}
.toggle-btn{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  padding:10px 12px;border-radius:8px;color:#fff;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  transition:all 0.2s;font-size:12px;font-family:var(--font-main);
  width:100%;text-align:left;
}
.toggle-btn:hover{background:rgba(255,255,255,0.08);}
.toggle-btn.active{background:rgba(0,245,255,0.12);border-color:var(--accent);color:var(--accent);}
.indicator{width:7px;height:7px;border-radius:50%;background:#222;flex-shrink:0;transition:background 0.2s,box-shadow 0.2s;}
.toggle-btn.active .indicator{background:var(--accent);box-shadow:0 0 8px var(--accent);}

.swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.swatch{aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid rgba(255,255,255,0.1);transition:transform 0.15s,border-color 0.15s;}
.swatch:hover{transform:scale(1.08);}
.swatch.active{border-color:#fff;transform:scale(1.08);}
input[type="color"]{width:100%;height:28px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;padding:2px;}

.gesture-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;margin-bottom:3px;font-size:11px;transition:background 0.2s;}
.gesture-item span:first-child{font-size:15px;width:20px;}
.gesture-item.active{background:rgba(0,245,255,0.1);color:var(--accent);}

#cam-wrap{position:absolute;bottom:20px;left:20px;width:150px;border-radius:10px;overflow:hidden;border:1px solid var(--border);box-shadow:0 0 16px rgba(0,245,255,0.1);}
#video{width:100%;display:block;transform:scaleX(-1);}

#brush-indicator{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.4);pointer-events:none;opacity:0;transition:opacity 0.4s;white-space:nowrap;}

#loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.5s;}
#loading h2{font-family:var(--font-mono);font-size:18px;letter-spacing:0.2em;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
.loading-sub{margin-top:14px;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;}
@keyframes spin{to{transform:rotate(360deg);}}

.footer{padding:14px 20px;font-family:var(--font-mono);font-size:9px;opacity:0.25;line-height:2;}
</style>
</head>
<body>

<div id="loading">
  <h2>AIR DRAW PRO</h2>
  <div class="spinner"></div>
  <p class="loading-sub">LOADING HAND TRACKING...</p>
</div>

<div id="canvas-area">
  <canvas id="drawCanvas"></canvas>
  <div id="brush-indicator">Brush: 10px</div>
  <div id="cam-wrap"><video id="video" playsinline muted></video></div>
</div>

<div id="sidebar">
  <!-- LOGO — sticky at top -->
  <div class="logo-area">
    <h1>AIR DRAW PRO</h1>
    <div id="hand-status" class="status-tag">SCANNING...</div>
  </div>

  <!-- ENGINE CONTROLS — now first, always visible -->
  <div class="section">
    <div class="section-label">Engine Controls</div>
    <div class="control-group">
      <button class="toggle-btn" id="gravity-toggle" onclick="toggleGravity()">
        Gravity Physics <div class="indicator"></div>
      </button>
      <button class="toggle-btn" id="rainbow-toggle" onclick="toggleRainbow()">
        Rainbow Mode <div class="indicator"></div>
      </button>
      <button class="toggle-btn" onclick="undoStroke()">Undo Last <span>↩</span></button>
      <button class="toggle-btn" onclick="clearAll()">Clear Canvas <span>⊘</span></button>
      <button class="toggle-btn" onclick="saveImage()">Save PNG <span>↓</span></button>
    </div>
  </div>

  <!-- BACKGROUND -->
  <div class="section">
    <div class="section-label">Background</div>
    <div class="swatch-grid" id="bg-grid"></div>
    <input type="color" id="custom-bg" value="#030305">
  </div>

  <!-- COLOR -->
  <div class="section">
    <div class="section-label">Brush Color</div>
    <div class="swatch-grid" id="color-grid"></div>
    <input type="color" id="custom-color" value="#00f5ff">
  </div>

  <!-- GESTURE GUIDE -->
  <div class="section">
    <div class="section-label">Gesture Guide</div>
    <div id="gesture-list">
      <div class="gesture-item" id="g-draw"><span>☝️</span><div><b>Index up</b> — Draw</div></div>
      <div class="gesture-item" id="g-erase"><span>🖐️</span><div><b>Open palm</b> — Erase</div></div>
      <div class="gesture-item" id="g-pinch"><span>🤏</span><div><b>Pinch</b> — Resize brush</div></div>
      <div class="gesture-item" id="g-pause"><span>✊</span><div><b>Fist</b> — Pause</div></div>
    </div>
  </div>

  <div class="footer">
    G = gravity toggle<br>
    R = rainbow toggle<br>
    Ctrl+Z = undo &nbsp; Esc = clear<br>
    Ctrl+S = save PNG
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const canvas = document.getElementById('drawCanvas');
const ctx    = canvas.getContext('2d');

const COLORS     = ['#00f5ff','#ff00ff','#39ff14','#ffff00','#ff6b35','#ff3860','#ffffff','#7c4dff'];
const BG_PRESETS = ['#030305','#0d1117','#1a0a2e','#0a1628','#f5f5f0','#1a1008','#2d1b00','#001a0d'];

let strokes = [], currentStroke = null;
let activeColor = COLORS[0], bgColor = '#030305';
let brushSize = 12;
let gravityActive = false, rainbowActive = false;
let hue = 0, animTime = 0, strokeIdSeq = 0;

// ── Smoothing: two-stage low-pass filter ────────
// rawX/Y = direct from MediaPipe
// smoothX/Y = heavily smoothed for drawing
let rawX = 0, rawY = 0;
let smoothX = 0, smoothY = 0;
const LERP = 0.18;          // lower = smoother, less lag trade-off
const MIN_DIST = 4;         // minimum px moved before adding a new point — KILLS dot artifacts

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════
// SWATCHES
// ═══════════════════════════════════════════════
function buildSwatches(containerId, palette, getCurrent, setter, inputId) {
  const grid = document.getElementById(containerId);
  palette.forEach(hex => {
    const d = document.createElement('div');
    d.className = 'swatch' + (hex === getCurrent() ? ' active' : '');
    d.style.cssText = `background:${hex};box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08);`;
    d.title = hex;
    d.onclick = () => {
      setter(hex);
      if (inputId) document.getElementById(inputId).value = hex;
      grid.querySelectorAll('.swatch').forEach(e => e.classList.remove('active'));
      d.classList.add('active');
    };
    grid.appendChild(d);
  });
  if (inputId) {
    document.getElementById(inputId).addEventListener('input', e => {
      setter(e.target.value);
      grid.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    });
  }
}

buildSwatches('bg-grid',    BG_PRESETS, () => bgColor,     v => bgColor = v,     'custom-bg');
buildSwatches('color-grid', COLORS,     () => activeColor,  v => activeColor = v, 'custom-color');

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════
function toggleGravity() {
  gravityActive = !gravityActive;
  document.getElementById('gravity-toggle').classList.toggle('active');
}
function toggleRainbow() {
  rainbowActive = !rainbowActive;
  document.getElementById('rainbow-toggle').classList.toggle('active');
}
function undoStroke() { if (strokes.length) strokes.pop(); }
function clearAll()   { strokes = []; currentStroke = null; }
function saveImage()  {
  const a = document.createElement('a');
  a.download = `airdraw-${Date.now()}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function showBrushHint() {
  const el = document.getElementById('brush-indicator');
  el.textContent = `Brush: ${Math.round(brushSize)}px`;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 1500);
}

// ═══════════════════════════════════════════════
// PHYSICS — only runs when gravity is ON
// ═══════════════════════════════════════════════
function updatePhysics() {
  if (!gravityActive) return;
  strokes.forEach(s => {
    s.vy = (s.vy || 0) + 0.4;
    s.vx = (s.vx || 0) * 0.97;
    let maxY = -Infinity;
    s.points.forEach(p => {
      p.y += s.vy; p.x += s.vx;
      if (p.y > maxY) maxY = p.y;
    });
    if (maxY > canvas.height) {
      const diff = maxY - canvas.height;
      s.points.forEach(p => p.y -= diff);
      s.vy *= -0.5;
      if (Math.abs(s.vy) < 0.5) s.vy = 0;
    }
  });
}

// ═══════════════════════════════════════════════
// RENDER — clean neon stroke, NO circles
// ═══════════════════════════════════════════════
function renderStroke(s) {
  if (s.points.length < 2) return;

  // Pulse glow slightly over time
  const pulse = 0.75 + 0.25 * Math.sin(animTime * 1.8 + (s.id || 0) * 1.7);

  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  // Build the smooth path once — reuse for both layers
  const path = new Path2D();
  path.moveTo(s.points[0].x, s.points[0].y);
  for (let i = 1; i < s.points.length - 1; i++) {
    const mx = (s.points[i].x + s.points[i+1].x) / 2;
    const my = (s.points[i].y + s.points[i+1].y) / 2;
    path.quadraticCurveTo(s.points[i].x, s.points[i].y, mx, my);
  }
  const last = s.points[s.points.length - 1];
  path.lineTo(last.x, last.y);

  // Layer 1 — outer neon glow
  ctx.shadowColor = s.color;
  ctx.shadowBlur  = 20 * pulse;
  ctx.strokeStyle = s.color;
  ctx.lineWidth   = s.width;
  ctx.stroke(path);

  // Layer 2 — thin bright core (no separate dots — same path, just thinner)
  ctx.shadowBlur  = 4;
  ctx.shadowColor = '#ffffff';
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = Math.max(0.8, s.width * 0.15);
  ctx.stroke(path);

  ctx.restore();
}

// ═══════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════
function draw() {
  requestAnimationFrame(draw);
  animTime += 0.016;

  // Apply LERP smoothing every frame
  smoothX += (rawX - smoothX) * LERP;
  smoothY += (rawY - smoothY) * LERP;

  // Clear and fill background
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  updatePhysics();

  // Render completed strokes + current live stroke
  strokes.forEach(renderStroke);
  if (currentStroke) renderStroke(currentStroke);
}
draw();

// ═══════════════════════════════════════════════
// GESTURE HUD
// ═══════════════════════════════════════════════
function setGestureActive(id) {
  ['g-draw','g-erase','g-pinch','g-pause'].forEach(g =>
    document.getElementById(g)?.classList.remove('active')
  );
  if (id) document.getElementById(id)?.classList.add('active');
}

// ═══════════════════════════════════════════════
// MEDIAPIPE
// ═══════════════════════════════════════════════
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});

hands.setOptions({
  maxNumHands:            1,
  modelComplexity:        0,   // 0 = faster, lower latency
  minDetectionConfidence: 0.55,
  minTrackingConfidence:  0.45,
});

hands.onResults(results => {
  // Hide loading overlay on first result
  const loadEl = document.getElementById('loading');
  if (loadEl && loadEl.style.display !== 'none') {
    loadEl.style.opacity = '0';
    setTimeout(() => loadEl.style.display = 'none', 500);
  }

  const status = document.getElementById('hand-status');

  if (!results.multiHandLandmarks?.length) {
    status.textContent = 'NO HAND — show palm';
    status.style.color  = 'rgba(255,255,255,0.3)';
    setGestureActive(null);
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
    return;
  }

  const lm = results.multiHandLandmarks[0];

  // Mirror X (camera is mirrored)
  rawX = (1 - lm[8].x) * canvas.width;
  rawY = lm[8].y * canvas.height;

  // Finger extension checks
  const indexUp  = lm[8].y  < lm[6].y;
  const middleUp = lm[12].y < lm[10].y;
  const ringUp   = lm[16].y < lm[14].y;
  const pinkyUp  = lm[20].y < lm[18].y;
  const pinchDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);

  // ── ERASE: all fingers up (open palm) ──────
  if (indexUp && middleUp && ringUp && pinkyUp) {
    status.textContent = 'ERASE 🖐️';
    status.style.color  = '#ff5555';
    setGestureActive('g-erase');
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
    strokes = strokes.filter(s =>
      !s.points.some(p => Math.hypot(p.x - smoothX, p.y - smoothY) < 50)
    );

  // ── PINCH: resize brush ─────────────────────
  } else if (pinchDist < 0.07 && !middleUp) {
    status.textContent = 'RESIZE 🤏';
    status.style.color  = '#ffcc00';
    setGestureActive('g-pinch');
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
    brushSize = Math.max(3, Math.min(50, pinchDist * 600 + 3));
    showBrushHint();

  // ── DRAW: index up only ─────────────────────
  } else if (indexUp && !middleUp) {
    status.textContent = 'PAINTING ☝️';
    status.style.color  = '#00f5ff';
    setGestureActive('g-draw');

    const col = rainbowActive ? `hsl(${hue},100%,60%)` : activeColor;

    if (!currentStroke) {
      currentStroke = {
        id: strokeIdSeq++,
        points: [{ x: smoothX, y: smoothY }],
        color: col,
        width: brushSize,
        vy: 0, vx: 0,
      };
    } else {
      // ✅ FIX: only add point if hand moved enough — prevents dot artifacts
      const last = currentStroke.points[currentStroke.points.length - 1];
      const dist = Math.hypot(smoothX - last.x, smoothY - last.y);
      if (dist > MIN_DIST) {
        currentStroke.points.push({ x: smoothX, y: smoothY });
      }
    }

  // ── FIST: pause ─────────────────────────────
  } else if (!indexUp && !middleUp && !ringUp && !pinkyUp) {
    status.textContent = 'PAUSED ✊';
    status.style.color  = 'rgba(255,255,255,0.4)';
    setGestureActive('g-pause');
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }

  // ── IDLE ────────────────────────────────────
  } else {
    status.textContent = 'TRACKING ✅';
    status.style.color  = '#00f5ff';
    setGestureActive(null);
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
  }

  if (rainbowActive) hue = (hue + 2) % 360;
});

// ═══════════════════════════════════════════════
// CAMERA — direct getUserMedia (most reliable)
// ═══════════════════════════════════════════════
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
  .then(stream => {
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadeddata', () => {
      async function predict() {
        if (video.readyState >= 2) await hands.send({ image: video });
        requestAnimationFrame(predict);
      }
      predict();
    });
  })
  .catch(err => {
    document.getElementById('loading').innerHTML = `
      <h2 style="font-family:monospace;color:#ff5555;">CAMERA ERROR</h2>
      <p style="font-size:13px;text-align:center;line-height:2.2;margin-top:16px;color:rgba(255,150,150,0.8);">
        ${err.name === 'NotAllowedError'
          ? 'Permission denied.<br>Click the 🔒 lock in the address bar<br>→ Allow Camera → Reload page'
          : err.message}
      </p>`;
  });

// ═══════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undoStroke(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveImage(); }
  if (e.key==='Escape') clearAll();
  if (e.key==='g') toggleGravity();
  if (e.key==='r') toggleRainbow();
});
</script>
</body>
</html>
